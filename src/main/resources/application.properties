
spring.application.name=LibrarySystem

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.jpa.hibernate.ddl-auto=validate


springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=https://library-management-system-production-b765.up.railway.app/v3/api-docs
springdoc.servers[0].url=https://library-management-system-production-b765.up.railway.app
springdoc.servers[0].description=Production
springdoc.servers[1].url=http://localhost:8080
springdoc.servers[1].description=Local